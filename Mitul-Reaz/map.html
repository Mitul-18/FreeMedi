<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreeMedi Emergency Map</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f0fdf4;
}

.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:white;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.nav a{
text-decoration:none;
color:#0f766e;
font-weight:bold;
}

.header{
text-align:center;
padding:15px;
}

.header h1{
color:#0f766e;
margin:0;
}

.container{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
padding:20px;
}

#map{
height:450px;
width:700px;
max-width:95%;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.info{
width:320px;
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #ddd;
outline:none;
}

.badge{
display:inline-block;
padding:6px 12px;
border-radius:20px;
font-size:12px;
color:white;
margin-top:10px;
}

.high{background:#ef4444;}
.medium{background:#f59e0b;}
.low{background:#10b981;}

.btn{
display:block;
margin-top:15px;
text-align:center;
padding:10px;
background:#0f766e;
color:white;
text-decoration:none;
border-radius:8px;
}
</style>
</head>

<body>

<div class="nav">
<b>FreeMedi Smart Emergency Map</b>
<a href="index.html">Home</a>
</div>

<div class="header">
<h1>Dhaka Emergency Risk Map</h1>
<p>Select your area to check safety level</p>
</div>

<div class="container">

<div id="map"></div>

<div class="info">

<h3>Select Your Area</h3>

<select id="areaSelect" onchange="checkRisk()">
<option value="">-- Select Area --</option>
<option value="jatrabari">Jatrabari</option>
<option value="mirpur">Mirpur</option>
<option value="dhanmondi">Dhanmondi</option>
<option value="uttara">Uttara</option>
<option value="gulshan">Gulshan</option>
<option value="banani">Banani</option>
<option value="mohammadpur">Mohammadpur</option>
<option value="motijheel">Motijheel</option>
</select>

<p id="locText" style="margin-top:10px;color:#444;">
Please select your location
</p>

<p><b>Risk Level:</b></p>
<div id="riskBox" class="badge low">LOW</div>

<p style="margin-top:10px"><b>Suggestion:</b></p>
<p id="suggest">All safe. Stay normal.</p>

<a class="btn" href="emergency.html">Find Hospitals</a>

</div>

</div>

<script>

// MAP INIT
var map = L.map('map').setView([23.8103, 90.4125], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'OpenStreetMap'
}).addTo(map);

// RISK ZONES (visual only)
const zones = [
{ name:"Jatrabari", lat:23.7104, lon:90.4348, risk:"HIGH" },
{ name:"Mirpur", lat:23.8067, lon:90.3687, risk:"MEDIUM" },
{ name:"Dhanmondi", lat:23.7465, lon:90.3760, risk:"LOW" },
{ name:"Gulshan", lat:23.7925, lon:90.4078, risk:"LOW" },
{ name:"Banani", lat:23.7935, lon:90.4005, risk:"LOW" },
{ name:"Mohammadpur", lat:23.7662, lon:90.3622, risk:"MEDIUM" },
{ name:"Motijheel", lat:23.7330, lon:90.4170, risk:"HIGH" }
];

// draw circles
zones.forEach(z=>{
L.circle([z.lat,z.lon],{
radius:2000,
color: z.risk==="HIGH"?"red":z.risk==="MEDIUM"?"orange":"green",
fillOpacity:0.2
}).addTo(map).bindPopup(z.name+" - "+z.risk);
});

// RISK DATA
const riskData = {
jatrabari:{risk:"HIGH",suggest:"⚠ High density + outbreak risk area. Avoid crowded places."},
mirpur:{risk:"MEDIUM",suggest:"⚠ Moderate risk. Stay alert."},
dhanmondi:{risk:"LOW",suggest:"✔ Safe zone. Normal activity fine."},
uttara:{risk:"LOW",suggest:"✔ Clean and safe area."},
gulshan:{risk:"LOW",suggest:"✔ Very safe monitored zone."},
banani:{risk:"LOW",suggest:"✔ Low risk premium area."},
mohammadpur:{risk:"MEDIUM",suggest:"⚠ Slight health alerts reported."},
motijheel:{risk:"HIGH",suggest:"🚨 Busy zone. Take care of health."}
};

function checkRisk(){

let area = document.getElementById("areaSelect").value;

let locText = document.getElementById("locText");
let riskBox = document.getElementById("riskBox");
let suggest = document.getElementById("suggest");

if(!area){
locText.innerText = "Please select your location";
return;
}

let data = riskData[area];

locText.innerText = "📍 Selected Area: " + area.toUpperCase();

riskBox.innerText = data.risk;

if(data.risk==="HIGH"){
riskBox.className="badge high";
}
else if(data.risk==="MEDIUM"){
riskBox.className="badge medium";
}
else{
riskBox.className="badge low";
}

suggest.innerText = data.suggest;
}

</script>

</body>
</html>
